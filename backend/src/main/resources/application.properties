# ==============================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (MySQL)
# ==============================================================
# Cambia 'db_planilla' por el nombre real de tu base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_planilla?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==============================================================
# 'update' crea las tablas si no existen o las actualiza sin borrar datos.
# Para producción se recomienda 'none' o 'validate'.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================================================
# CONFIGURACIÓN DEL SERVIDOR
# ==============================================================
server.port=8080
server.servlet.context-path=/api

# ==============================================================
# CONFIGURACIÓN DE JWT (Seguridad)
# ==============================================================
# Clave secreta para firmar los tokens (Usa una cadena larga y compleja)
planilla.app.jwtSecret=ClaveSecretaParaSistemaPlanillaUDB2026_SecureKey
# Tiempo de expiración (86400000 ms = 24 horas)
planilla.app.jwtExpirationMs=86400000

# ==============================================================
# CONFIGURACIÓN DE SUBIDA DE ARCHIVOS (Para Reportes/Documentos)
# ==============================================================
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB